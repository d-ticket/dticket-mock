<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイチケット</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#03112b,#1c478d);
color:#fff;
}

/* ===== HEADER ===== */
.header{
background:#1fc6c7;
height:60px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
font-weight:bold;
}

.menu-btn{
position:absolute;
left:10px;
top:10px;
cursor:pointer;
}

.menu-btn div{
width:25px;
height:3px;
background:#fff;
margin:5px 0;
}

/* ===== MENU ===== */
.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#f5f5f5;
color:#000;
transition:0.3s;
z-index:1000;
padding:20px;
}

.menu.open{
left:0;
}

.menu h3{
margin-top:0;
}

.menu-item{
padding:15px 0;
border-bottom:1px solid #ddd;
font-weight:bold;
}

/* ===== TICKET ===== */
.ticket{
width:260px;
margin:40px auto;
background:#000;
border-radius:6px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.ticket-top{
height:120px;
position:relative;
background:linear-gradient(135deg,#0a1f57,#173890);
}

/* QR */
.qr{
position:absolute;
left:20px;
top:20px;
width:90px;
height:90px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
}

.qr img{
width:100%;
height:100%;
object-fit:cover;
image-rendering:pixelated;
}

/* QR TIME */
.qr-time{
position:absolute;
bottom:0;
left:0;
right:0;
background:#000;
color:#fff;
font-size:10px;
text-align:center;
padding:3px;
}

/* WARNING */
.warning{
position:absolute;
right:10px;
top:20px;
width:130px;
font-size:10px;
background:rgba(0,0,0,0.6);
padding:6px;
line-height:1.4;
}

/* BODY */
.body{
padding:12px;
}

.title{
font-size:12px;
font-weight:bold;
margin-top:8px;
}

/* SHARE BUTTON */
.share{
margin:20px auto;
display:block;
width:180px;
background:#df003c;
border:none;
color:#fff;
padding:12px;
border-radius:30px;
font-weight:bold;
}

/* ===== MENU OVERLAY ===== */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
z-index:900;
}

.overlay.show{
display:block;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu" id="menu">
<h3>夏目 敏之 さん</h3>

<div class="menu-item">アカウント設定</div>
<div class="menu-item">マイチケット</div>
<div class="menu-item">お知らせ</div>
<div class="menu-item">リセール</div>
<div class="menu-item">抽選履歴</div>
<div class="menu-item">クーポン</div>
<div class="menu-item">使い方ガイド</div>

<button class="share">d ticket TOPへ</button>
</div>

<div class="overlay" id="overlay"></div>

<!-- HEADER -->
<div class="header">
<div class="menu-btn" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>
マイチケット
</div>

<!-- TICKET -->
<div class="ticket">

<div class="ticket-top">

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=dticket">
<div class="qr-time" id="time">--:--:--</div>
</div>

<div class="warning">
【特定チケット】<br>
無断有償譲渡禁止<br>
本券は購入者の氏名・<br>
連絡先を確認の上販売<br>
されています。
</div>

</div>

<div class="body">
<div>4/4(土)</div>
<div>MUFG STADIUM</div>

<div class="title">
THE MUSIC STADIUM 2026 organized by ONE OK ROCK
</div>

</div>

</div>

<script>
/* ===== MENU ===== */
function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
}

/* ===== COUNTDOWN ===== */
function updateTime(){
let now=new Date();
let target=new Date();
target.setHours(15,30,0);

let diff=(target-now)/1000;
if(diff<0) diff=0;

let h=Math.floor(diff/3600);
let m=Math.floor((diff%3600)/60);
let s=Math.floor(diff%60);

document.getElementById("time").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");
}

setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
